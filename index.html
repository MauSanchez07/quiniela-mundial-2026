<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Quiniela Mundial 2026 — MAITS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#1a1a2e;min-height:100vh}
:root{--green:#006847;--red:#CE1126;--gold:#c9a227;--sidebar:220px}
/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar);background:#fff;border-right:1px solid #e8ecf0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
#main{margin-left:var(--sidebar);flex:1;padding:24px;min-height:100vh}
/* Sidebar */
.sb-logo{padding:20px 16px 12px;border-bottom:1px solid #e8ecf0}
.sb-logo h1{font-size:13px;font-weight:700;color:var(--green);letter-spacing:.5px}
.sb-logo p{font-size:10px;color:#888;margin-top:2px}
.sb-nav{padding:8px 0;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;color:#555;font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent;text-decoration:none}
.sb-item:hover{background:#f0faf5;color:var(--green)}
.sb-item.active{background:#f0faf5;color:var(--green);border-left-color:var(--green);font-weight:600}
.sb-item .icon{font-size:16px;width:20px;text-align:center}
/* Cards */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:16px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f7f8fa;color:#666;font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid #e8ecf0;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcff}
.rank-badge{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.r1{background:var(--gold)}
.r2{background:#aaa}
.r3{background:#cd7f32}
.rn{background:#ddd;color:#666}
/* Buttons */
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#005538}
.btn-outline{background:#fff;color:var(--green);border:1.5px solid var(--green)}
.btn-outline:hover{background:#f0faf5}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.filter-btn{padding:6px 13px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;font-weight:500;color:#555;transition:all .15s}
.filter-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.search-box{padding:7px 12px;border:1.5px solid #ddd;border-radius:20px;font-size:12px;outline:none;min-width:160px}
.search-box:focus{border-color:var(--green)}
/* Match rows */
.match-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f2f5;font-size:13px;transition:background .1s}
.match-row:hover{background:#fafcff}
.match-meta{color:#888;font-size:11px;width:60px;flex-shrink:0}
.match-teams{flex:1;display:flex;align-items:center;gap:8px;font-weight:600;min-width:0}
.team-name{flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-name.right{text-align:left}
.score-box{background:#f7f8fa;border:1.5px solid #e0e5ec;border-radius:8px;padding:5px 12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;min-width:52px;text-align:center;color:#1a1a2e}
.score-box:hover{border-color:var(--green);background:#f0faf5;color:var(--green)}
.score-box.pending{color:#bbb;border-style:dashed}
.score-box.has-result{border-color:var(--green);background:#f0faf5}
.score-editor{display:flex;align-items:center;gap:4px}
.score-input{width:38px;padding:4px 6px;border:1.5px solid var(--green);border-radius:6px;font-size:14px;font-weight:700;text-align:center;outline:none}
/* Groups section */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.group-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.group-header{background:var(--green);color:#fff;padding:10px 16px;font-size:13px;font-weight:700}
/* Stats */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.kpi{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:14px 16px}
.kpi-val{font-size:28px;font-weight:800;color:var(--green)}
.kpi-label{font-size:11px;color:#888;margin-top:2px}
/* SVG chart */
#chart-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:16px;overflow-x:auto}
.chart-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.legend-item{display:inline-flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;padding:3px 8px;border-radius:12px;border:1px solid #ddd;background:#fff;transition:all .15s}
.legend-item.off{opacity:.35}
/* Player tabs */
.player-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.ptab{padding:6px 12px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;font-weight:500;color:#555;transition:all .15s}
.ptab.active{background:var(--green);color:#fff;border-color:var(--green)}
/* Comparativo */
.h2h-bar{height:14px;border-radius:4px;transition:width .4s}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* Heatmap */
.heatmap-wrap{overflow-x:auto}
.heatmap-table th,.heatmap-table td{padding:5px 7px;text-align:center;font-size:11px;border:1px solid #f0f2f5}
.heat-0{background:#fff}
.heat-1{background:#d4edda}
.heat-2{background:#a3d8af}
.heat-3{background:#5cb878}
.heat-4{background:#2e8b57}
.heat-5{background:#006847;color:#fff}
/* Fire streak */
.fire{color:#e25822;font-size:14px}
/* Badges */
.badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-exact{background:#d4edda;color:#155724}
.badge-diff{background:#fff3cd;color:#856404}
.badge-win{background:#d1ecf1;color:#0c5460}
.badge-miss{background:#f8d7da;color:#721c24}
/* Section header */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-header h2{font-size:20px;font-weight:800;color:#1a1a2e}
/* Mobile */
#bottom-nav{display:none;position:fixed;top:0;left:0;right:0;background:#fff;border-bottom:2px solid #e8ecf0;z-index:200;padding:0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
@media(max-width:768px){
  #sidebar{display:none}
  #main{margin-left:0;padding:70px 10px 20px}
  #bottom-nav{display:flex}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .groups-grid{grid-template-columns:1fr}
  .compare-grid{grid-template-columns:1fr}
}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:#999;font-size:10px;gap:2px;border:none;background:none;transition:color .15s}
.bn-item.active{color:var(--green)}
.bn-item .icon{font-size:18px}
/* Picks panel */
.picks-panel{display:none;background:#f7f8fa;border-top:1px solid #e8ecf0;padding:12px 14px;flex-wrap:wrap;gap:6px}
.picks-panel.open{display:flex}
.pick-chip{display:flex;flex-direction:column;align-items:center;padding:5px 9px;border-radius:8px;background:#fff;border:1.5px solid #e0e5ec;font-size:11px;min-width:64px;cursor:default;transition:border-color .15s}
.pick-chip.exact{border-color:#2e8b57;background:#f0faf5}
.pick-chip.diff{border-color:#c9a227;background:#fffbf0}
.pick-chip.win{border-color:#3b82f6;background:#eff6ff}
.pick-chip.miss{border-color:#e0e5ec;background:#fff;opacity:.7}
.pick-chip.pending{border-color:#e0e5ec;background:#fff}
.pick-name{font-weight:700;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.pick-score{font-size:12px;font-weight:700;color:#555;margin:1px 0}
.pick-pts{font-size:10px;font-weight:700}
.pick-pts.p5{color:#006847}.pick-pts.p3{color:#c9a227}.pick-pts.p2{color:#3b82f6}.pick-pts.p0{color:#bbb}
.toggle-picks{font-size:11px;color:#888;cursor:pointer;padding:2px 8px;border-radius:10px;border:1px solid #ddd;background:#fff;margin-left:6px;white-space:nowrap;flex-shrink:0}
.toggle-picks:hover{border-color:var(--green);color:var(--green)}
/* Select */
select{padding:7px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;outline:none;background:#fff;cursor:pointer}
select:focus{border-color:var(--green)}
/* Points pill */
.pts-pill{background:#f0faf5;color:var(--green);font-weight:700;padding:2px 9px;border-radius:10px;font-size:12px}
</style>
</head>

// ===================== SCORING =====================
function calcPoints(pickStr,rl,rv){
  if(rl===null||rl===undefined||rv===null||rv===undefined)return 0;
  if(!pickStr)return 0;
  const parts=pickStr.split('-');
  if(parts.length!==2)return 0;
  const pl=parseInt(parts[0]),pv=parseInt(parts[1]);
  if(isNaN(pl)||isNaN(pv))return 0;
  let pts=0,extra=0;
  if(pl===rl&&pv===rv){pts=5;}
  else{
    const rDiff=rl-rv,pDiff=pl-pv;
    const rSign=Math.sign(rDiff),pSign=Math.sign(pDiff);
    if(rSign===pSign&&rSign!==0&&rDiff===pDiff){pts=3;}
    else if(rSign===pSign){pts=2;}
    // extras (only if not exact)
    if(pl===rl)extra+=1;
    if(pv===rv)extra+=1;
  }
  return pts+extra;
}

function playerTotals(){
  const totals={};
  PLAYERS.forEach(p=>{
    totals[p]={pts:0,exact:0,diff:0,win:0,extra:0,streak:0,streakRaw:[]};
  });
  MATCHES.forEach(m=>{
    const r=RES[m.id];
    const rl=r?r.rl:m.rl;
    const rv=r?r.rv:m.rv;
    if(rl===null||rl===undefined)return;
    PLAYERS.forEach(p=>{
      const pick=m.picks[p];
      if(!pick)return;
      const parts=pick.split('-');
      const pl=parseInt(parts[0]),pv=parseInt(parts[1]);
      if(isNaN(pl)||isNaN(pv))return;
      let pts=0,extra=0,cat='miss';
      if(pl===rl&&pv===rv){pts=5;cat='exact';}
      else{
        const rD=rl-rv,pD=pl-pv;
        const rS=Math.sign(rD),pS=Math.sign(pD);
        if(rS===pS&&rS!==0&&rD===pD){pts=3;cat='diff';}
        else if(rS===pS){pts=2;cat='win';}
        if(pl===rl)extra+=1;
        if(pv===rv)extra+=1;
      }
      totals[p].pts+=pts+extra;
      if(cat==='exact'){totals[p].exact++;}
      else if(cat==='diff'){totals[p].diff++;}
      else if(cat==='win'){totals[p].win++;}
      totals[p].streakRaw.push(cat);
    });
  });
  // streak
  PLAYERS.forEach(p=>{
    const sr=totals[p].streakRaw;
    let s=0;
    for(let i=sr.length-1;i>=0;i--){
      if(sr[i]!=='miss')s++;else break;
    }
    totals[p].streak=s;
  });
  return totals;
}

function matchPointsForPlayer(m,p){
  const r=RES[m.id];
  const rl=r?r.rl:m.rl;
  const rv=r?r.rv:m.rv;
  if(rl===null||rl===undefined)return null;
  return calcPoints(m.picks[p],rl,rv);
}

  // Overlay localStorage
  try{
    const saved=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    Object.keys(saved).forEach(id=>{RES[parseInt(id)]=saved[id];});
  }catch(e){}
  renderAll();
}

function saveResult(id,rl,rv){
  let saved={};
  try{saved=JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch(e){}
  saved[id]={rl,rv};
  localStorage.setItem(LS_KEY,JSON.stringify(saved));
  RES[id]={rl,rv};
  renderAll();

function renderTabla(){
  const totals=playerTotals();
  const ranked=PLAYERS.slice().sort((a,b)=>totals[b].pts-totals[a].pts);
  const playedCount=MATCHES.filter(m=>{const r=RES[m.id];const rl=r?r.rl:m.rl;return rl!==null&&rl!==undefined;}).length;
  let h=`<div class="section-header"><h2>🏆 Tabla General</h2><span style="font-size:12px;color:#888">${playedCount}/72 partidos finalizados</span></div>`;
  h+=`<div class="card"><table>
  <thead><tr><th>Pos</th><th>Jugador</th><th>Pts</th><th>Exactos</th><th>Dif</th><th>Ganador</th><th>Extras</th><th>Racha🔥</th></tr></thead><tbody>`;
  ranked.forEach((p,i)=>{
    const t=totals[p];
    const pos=i+1;
    const rc=pos===1?'r1':pos===2?'r2':pos===3?'r3':'rn';
    const fire=t.streak>=3?'🔥'.repeat(Math.min(t.streak,5)):'';
    h+=`<tr>
      <td><span class="rank-badge ${rc}">${pos}</span></td>
      <td><strong>${p}</strong></td>
      <td><span class="pts-pill">${t.pts}</span></td>
      <td>${t.exact}</td><td>${t.diff}</td><td>${t.win}</td>
      <td>${t.pts-t.exact*5-t.diff*3-t.win*2}</td>
      <td>${fire||'—'} ${t.streak>0?t.streak+'':''}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById('view-tabla').innerHTML=h;
}

function renderPartidos(){

  h+=`<div class="filters">
    <button class="filter-btn ${_partFilter==='all'?'active':''}" onclick="setPartFilter('all')">Todos</button>

    <button class="filter-btn ${_partFilter==='done'?'active':''}" onclick="setPartFilter('done')">Finalizados</button>

      ${allDays.map(d=>`<option value="${d}" ${_partDay===d?'selected':''}>${fmtDate(d)}</option>`).join('')}
    </select>
    <input class="search-box" placeholder="🔍 Buscar equipo…" value="${_partSearch}" oninput="setPartSearch(this.value)">
  </div>`;
  
  let filtered=MATCHES.filter(m=>{
    if(_partFilter==='J1')return m.id<=24;
    if(_partFilter==='J2')return m.id>24&&m.id<=48;
    if(_partFilter==='J3')return m.id>48&&m.id<=72;
    if(_partFilter==='R32')return m.id>72&&m.id<=88;
    if(_partFilter==='done'){const r=RES[m.id];const rl=r?r.rl:m.rl;return rl!==null&&rl!==undefined;}
    if(_partFilter==='pending'){const r=RES[m.id];const rl=r?r.rl:m.rl;return rl===null||rl===undefined;}
    return true;
  });
  if(_partDay)filtered=filtered.filter(m=>m.date===_partDay);
  if(_partSearch)filtered=filtered.filter(m=>m.local.toLowerCase().includes(_partSearch.toLowerCase())||m.visitor.toLowerCase().includes(_partSearch.toLowerCase()));

  h+=`<div class="card" style="padding:0;overflow:hidden">`;
  if(filtered.length===0){h+=`<div style="padding:24px;color:#888;text-align:center">No hay partidos para este filtro</div>`;}
  filtered.forEach(m=>{
    const r=RES[m.id];
    const rl=r?r.rl:m.rl;
    const rv=r?r.rv:m.rv;

    const cls=hasr?'score-box has-result':'score-box pending';

      const pts=calcPoints(pick,rl,rv);
      const parts2=pick.split('-');const pl2=parseInt(parts2[0]),pv2=parseInt(parts2[1]);
      let cat='miss';
      if(pl2===rl&&pv2===rv)cat='exact';
      else{const rD=rl-rv,pD=pl2-pv2;const rS=Math.sign(rD),pS=Math.sign(pD);if(rS===pS&&rS!==0&&rD===pD)cat='diff';else if(rS===pS)cat='win';}
      const ptsCls=pts>=5?'p5':pts>=3?'p3':pts>=2?'p2':'p0';
      return `<div class="pick-chip ${cat}"><span class="pick-name">${p}</span><span class="pick-score">${pick}</span><span class="pick-pts ${ptsCls}">${pts}pts</span></div>`;
    }).join('');
    h+=`<div style="border-bottom:1px solid #f0f2f5">
      <div class="match-row" style="border-bottom:none">
        <div class="match-meta"><div style="font-weight:600;color:var(--green)">#${m.id}</div><div>${fmtDate(m.date)}</div></div>
        <div class="match-teams">
          <span class="team-name">${m.local}</span>

// ===================== STATS =====================
function renderStats(){
  const totals=playerTotals();
  const ranked=PLAYERS.slice().sort((a,b)=>totals[b].pts-totals[a].pts);
  const played=MATCHES.filter(m=>{const r=RES[m.id];const rl=r?r.rl:m.rl;return rl!==null&&rl!==undefined;});
  const totalPts=Object.values(totals).reduce((s,t)=>s+t.pts,0);
  const maxStreak=Math.max(...PLAYERS.map(p=>totals[p].streak));
  const leader=ranked[0];
  // Best predictor per team
  const teamHits={};
  played.forEach(m=>{
    [m.local,m.visitor].forEach(team=>{
      if(!teamHits[team])teamHits[team]={hits:0,total:0};
    });
    const r=RES[m.id];
    const rl=r?r.rl:m.rl;
    const rv=r?r.rv:m.rv;
    PLAYERS.forEach(p=>{
      const pick=m.picks[p];if(!pick)return;
      const pts=pick.split('-');
      const pl=parseInt(pts[0]),pv=parseInt(pts[1]);
      teamHits[m.local].total++;if(pl===rl)teamHits[m.local].hits++;
      teamHits[m.visitor].total++;if(pv===rv)teamHits[m.visitor].hits++;
    });
  });
  const teamList=Object.entries(teamHits).filter(([,v])=>v.total>0).map(([t,v])=>({team:t,pct:v.hits/v.total,hits:v.hits,total:v.total})).sort((a,b)=>b.pct-a.pct);

  let h=`<div class="section-header"><h2>📊 Stats</h2></div>`;
  // KPIs
  h+=`<div class="kpi-grid">
    <div class="kpi"><div class="kpi-val">${played.length}</div><div class="kpi-label">Partidos jugados</div></div>
    <div class="kpi"><div class="kpi-val">${leader}</div><div class="kpi-label">🥇 Líder actual</div></div>
    <div class="kpi"><div class="kpi-val">${totals[leader].pts}</div><div class="kpi-label">Puntos del líder</div></div>
    <div class="kpi"><div class="kpi-val">${maxStreak}🔥</div><div class="kpi-label">Racha activa más larga</div></div>
    <div class="kpi"><div class="kpi-val">${Math.round(totalPts/PLAYERS.length)}</div><div class="kpi-label">Puntos promedio</div></div>
    <div class="kpi"><div class="kpi-val">${PLAYERS.reduce((s,p)=>s+totals[p].exact,0)}</div><div class="kpi-label">Total marcadores exactos</div></div>
  </div>`;
  
  // Rachas activas
  h+=`<div class="card"><div class="card-title">🔥 Rachas Activas</div>`;
  const streakers=PLAYERS.filter(p=>totals[p].streak>0).sort((a,b)=>totals[b].streak-totals[a].streak);
  if(streakers.length===0){h+=`<p style="color:#888;font-size:13px">No hay rachas activas actualmente</p>`;}
  else{
    h+=`<div style="display:flex;flex-wrap:wrap;gap:8px">`;
    streakers.forEach(p=>{
      h+=`<div style="background:#fff8f0;border:1.5px solid #f5c98e;border-radius:10px;padding:8px 14px;text-align:center">
        <div style="font-weight:700;font-size:13px">${p}</div>
        <div style="color:#e25822;font-size:18px">🔥×${totals[p].streak}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

  // Equipos más acertados
  h+=`<div class="card"><div class="card-title">⚽ Equipos con más aciertos de gol</div>`;
  h+=`<table><thead><tr><th>Equipo</th><th>Aciertos</th><th>Total</th><th>Pct</th></tr></thead><tbody>`;
  teamList.slice(0,10).forEach(({team,hits,total,pct})=>{
    h+=`<tr><td>${team}</td><td>${hits}</td><td>${total}</td><td><div style="display:flex;align-items:center;gap:6px"><div style="width:${Math.round(pct*80)}px;height:8px;background:var(--green);border-radius:4px"></div>${Math.round(pct*100)}%</div></td></tr>`;
  });
  h+=`</tbody></table></div>`;

  // Heatmap
  h+=`<div class="card"><div class="card-title">🗺️ Heatmap de aciertos (últimos 18 partidos jugados)</div>`;
  const lastPlayed=played.slice(-18);
  h+=`<div class="heatmap-wrap"><table class="heatmap-table"><thead><tr><th>Jugador</th>`;
  lastPlayed.forEach(m=>h+=`<th>#${m.id}</th>`);
  h+=`</tr></thead><tbody>`;
  PLAYERS.forEach(p=>{
    h+=`<tr><td style="font-weight:600;text-align:left;white-space:nowrap">${p}</td>`;
    lastPlayed.forEach(m=>{
      const pts=matchPointsForPlayer(m,p);
      const cls=pts===null?'heat-0':`heat-${Math.min(pts,5)}`;
      h+=`<td class="${cls}" title="${pts!==null?pts+' pts':'—'}">${pts!==null?pts:''}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('view-stats').innerHTML=h;
}

// ===================== HISTÓRICO =====================
const COLORS=['#006847','#CE1126','#f59e0b','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#a855f7','#ef4444','#22c55e','#6366f1','#0ea5e9','#d97706','#db2777','#10b981','#7c3aed','#dc2626','#0891b2'];

function renderHistorico(){
  const totals=playerTotals();
  const ranked=PLAYERS.slice().sort((a,b)=>totals[b].pts-totals[a].pts);
  // Compute cumulative by jornada
  const jornadas=[
    {label:'J1',ids:MATCHES.filter(m=>m.id<=24).map(m=>m.id)},
    {label:'J2',ids:MATCHES.filter(m=>m.id>24&&m.id<=48).map(m=>m.id)},
    {label:'J3',ids:MATCHES.filter(m=>m.id>48&&m.id<=72).map(m=>m.id)},
    {label:'16vos',ids:MATCHES.filter(m=>m.id>72&&m.id<=88).map(m=>m.id)},
  ];
  // Build cumulative data per player per jornada
  const cumul={};
  PLAYERS.forEach(p=>cumul[p]=[]);
  jornadas.forEach((j,ji)=>{
    PLAYERS.forEach(p=>{
      let pts=0;
      j.ids.forEach(id=>{
        const m=MATCHES.find(x=>x.id===id);
        const r=RES[id];
        const rl=r?r.rl:m.rl;
        const rv=r?r.rv:m.rv;
        if(rl===null||rl===undefined)return;
        pts+=calcPoints(m.picks[p],rl,rv);
      });
      const prev=cumul[p].length>0?cumul[p][cumul[p].length-1]:0;
      cumul[p].push(prev+pts);
    });
  });

  let visSet;
  if(histFilter==='top5')visSet=new Set(ranked.slice(0,5));
  else if(histFilter==='top10')visSet=new Set(ranked.slice(0,10));
  else if(histFilter==='all')visSet=new Set(PLAYERS);
  else visSet=histCustom;

  let h=`<div class="section-header"><h2>📈 Histórico por Jornada</h2></div>`;
  h+=`<div class="chart-controls">
    <button class="filter-btn ${histFilter==='top5'?'active':''}" onclick="setHistFilter('top5')">Top 5</button>
    <button class="filter-btn ${histFilter==='top10'?'active':''}" onclick="setHistFilter('top10')">Top 10</button>
    <button class="filter-btn ${histFilter==='all'?'active':''}" onclick="setHistFilter('all')">Todos</button>
    <button class="filter-btn ${histFilter==='custom'?'active':''}" onclick="setHistFilter('custom')">Personalizar</button>
  </div>`;

  if(histFilter==='custom'){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">`;
    PLAYERS.forEach(p=>{
      h+=`<button class="ptab ${histCustom.has(p)?'active':''}" onclick="toggleHistCustom('${p}')">${p}</button>`;
    });
    h+=`</div>`;
  }

  // SVG chart
  const W=700,H=340,PAD={top:20,right:140,bottom:40,left:50};
  const cW=W-PAD.left-PAD.right;
  const cH=H-PAD.top-PAD.bottom;
  const visPlayers=PLAYERS.filter(p=>visSet.has(p));
  const maxPts=Math.max(...visPlayers.map(p=>Math.max(...cumul[p])),1);
  const xs=jornadas.map((_,i)=>PAD.left+i*(cW/(jornadas.length-1||1)));
  const ys=val=>PAD.top+cH-(val/maxPts)*cH;

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:500px">`;
  // Grid
  for(let i=0;i<=4;i++){
    const y=PAD.top+i*cH/4;
    const v=Math.round(maxPts*(1-i/4));
    svg+=`<line x1="${PAD.left}" y1="${y}" x2="${PAD.left+cW}" y2="${y}" stroke="#e8ecf0" stroke-width="1"/>
    <text x="${PAD.left-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#aaa">${v}</text>`;
  }
  // X axis
  jornadas.forEach((j,i)=>{
    svg+=`<text x="${xs[i]}" y="${H-12}" text-anchor="middle" font-size="11" fill="#888">${j.label}</text>`;
  });

  visPlayers.forEach((p,pi)=>{
    const col=COLORS[PLAYERS.indexOf(p)%COLORS.length];
    const pts=cumul[p];
    if(pts.length<2){return;}
    const points=pts.map((v,i)=>`${xs[i]},${ys(v)}`).join(' ');
    svg+=`<polyline points="${points}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round"/>`;
    pts.forEach((v,i)=>{
      svg+=`<circle cx="${xs[i]}" cy="${ys(v)}" r="4" fill="${col}" stroke="#fff" stroke-width="1.5">
        <title>${p}: ${v} pts</title></circle>`;
    });
    // Legend
    const ly=PAD.top+pi*18;
    svg+=`<rect x="${PAD.left+cW+10}" y="${ly}" width="12" height="12" fill="${col}" rx="2"/>
    <text x="${PAD.left+cW+26}" y="${ly+10}" font-size="11" fill="#333">${p} (${pts[pts.length-1]})</text>`;
  });
  svg+=`</svg>`;

  h+=`<div id="chart-wrap">${svg}</div>`;
  document.getElementById('view-historico').innerHTML=h;
}
function setHistFilter(f){histFilter=f;renderHistorico();}
function toggleHistCustom(p){if(histCustom.has(p))histCustom.delete(p);else histCustom.add(p);renderHistorico();}

// ===================== COMPARATIVO =====================
let cmpA='Mau',cmpB='Iago';
function renderComparativo(){
  const totals=playerTotals();
  let h=`<div class="section-header"><h2>⚖️ Comparativo H2H</h2></div>`;
  h+=`<div class="card"><div style="display:flex;gap:16px;align-items:center;margin-bottom:20px;flex-wrap:wrap">
    <div><label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Jugador A</label>
    <select onchange="setCmpA(this.value)">${PLAYERS.map(p=>`<option value="${p}" ${p===cmpA?'selected':''}>${p}</option>`).join('')}</select></div>
    <div style="font-size:24px;color:#888">VS</div>
    <div><label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Jugador B</label>
    <select onchange="setCmpB(this.value)">${PLAYERS.map(p=>`<option value="${p}" ${p===cmpB?'selected':''}>${p}</option>`).join('')}</select></div>
  </div>`;

  const ta=totals[cmpA],tb=totals[cmpB];
  const maxP=Math.max(ta.pts,tb.pts)||1;
  
  const rows=[
    ['Puntos totales',ta.pts,tb.pts],
    ['Marcadores exactos',ta.exact,tb.exact],
    ['Diferencia correcta',ta.diff,tb.diff],
    ['Ganador/empate',ta.win,tb.win],
    ['Racha activa',ta.streak,tb.streak],
  ];

  h+=`<div class="compare-grid">`;
  // H2H bars
  h+=`<div>`;
  rows.forEach(([label,va,vb])=>{
    const maxV=Math.max(va,vb)||1;
    const wA=Math.round((va/maxV)*100),wB=Math.round((vb/maxV)*100);
    h+=`<div style="margin-bottom:14px">
      <div style="font-size:12px;color:#888;margin-bottom:6px">${label}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:700;color:var(--green);width:32px;text-align:right">${va}</span>
        <div style="flex:1;position:relative;height:14px;background:#f0f2f5;border-radius:4px;overflow:hidden">
          <div class="h2h-bar" style="width:${wA}%;background:var(--green);position:absolute;right:50%;top:0;height:100%;transform:scaleX(-1);transform-origin:right center"></div>
          <div class="h2h-bar" style="width:${wB}%;background:var(--red);position:absolute;left:50%;top:0;height:100%"></div>
        </div>
        <span style="font-weight:700;color:var(--red);width:32px">${vb}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-top:2px"><span>${cmpA}</span><span>${cmpB}</span></div>
    </div>`;
  });
  h+=`</div>`;

  // Picks que difieren
  const played=MATCHES.filter(m=>{const r=RES[m.id];const rl=r?r.rl:m.rl;return rl!==null&&rl!==undefined;});
  const differ=played.filter(m=>{
    const pa=m.picks[cmpA],pb=m.picks[cmpB];
    return pa&&pb&&pa!==pb;
  });
  h+=`<div>`;
  h+=`<div style="font-size:13px;font-weight:700;margin-bottom:10px">Picks distintos (${differ.length} partidos jugados)</div>`;
  if(differ.length===0){h+=`<p style="color:#888;font-size:13px">No hay diferencias en partidos finalizados</p>`;}
  else{
    differ.slice(0,15).forEach(m=>{
      const r=RES[m.id];
      const rl=r?r.rl:m.rl,rv=r?r.rv:m.rv;
      const pa=m.picks[cmpA],pb=m.picks[cmpB];
      const ptsa=calcPoints(pa,rl,rv),ptsb=calcPoints(pb,rl,rv);
      h+=`<div style="font-size:12px;padding:6px 0;border-bottom:1px solid #f0f2f5;display:flex;gap:8px;align-items:center">
        <span style="color:#888;width:24px">#${m.id}</span>
        <span style="flex:1">${m.local} ${rl}—${rv} ${m.visitor}</span>
        <span style="font-weight:700;color:var(--green)">${pa}(${ptsa})</span>
        <span style="color:#aaa">vs</span>
        <span style="font-weight:700;color:var(--red)">${pb}(${ptsb})</span>
      </div>`;
    });
  }
  // Alcanzabilidad
  const pending=MATCHES.filter(m=>{const r=RES[m.id];const rl=r?r.rl:m.rl;return rl===null||rl===undefined;});
  const maxPerGame=6; // 5+1 extra approx
  const maxRemA=pending.reduce((s,m)=>{const p=m.picks[cmpA];return s+(p?maxPerGame:0);},0);
  const maxRemB=pending.reduce((s,m)=>{const p=m.picks[cmpB];return s+(p?maxPerGame:0);},0);
  const diff=ta.pts-tb.pts;
  let alc='';
  if(diff>0)alc=`<b>${cmpA}</b> lleva +${diff} pts. ${cmpB} necesitaría ganar ~${diff} pts netos en ${pending.length} partidos restantes.`;
  else if(diff<0)alc=`<b>${cmpB}</b> lleva +${Math.abs(diff)} pts. ${cmpA} necesitaría remontar en ${pending.length} partidos.`;
  else alc=`¡Empatados! Cualquiera puede ganar.`;
  h+=`<div style="background:#f0faf5;border-radius:8px;padding:10px 12px;margin-top:12px;font-size:12px;color:#333">${alc}</div>`;
  h+=`</div></div></div>`;
  document.getElementById('view-comparativo').innerHTML=h;
}
function setCmpA(p){cmpA=p;renderComparativo();}
function setCmpB(p){cmpB=p;renderComparativo();}

// ===================== JUGADORES =====================
let activePlayer=PLAYERS[0];
function renderJugadores(){
  const totals=playerTotals();
  let h=`<div class="section-header"><h2>👤 Jugadores</h2></div>`;
  h+=`<div class="player-tabs">`;
  PLAYERS.forEach(p=>{
    h+=`<button class="ptab ${p===activePlayer?'active':''}" onclick="setActivePlayer('${p}')">${p}</button>`;
  });
  h+=`</div>`;

  const t=totals[activePlayer];
  const rank=PLAYERS.slice().sort((a,b)=>totals[b].pts-totals[a].pts).indexOf(activePlayer)+1;
  h+=`<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <div class="kpi" style="flex:1;min-width:100px"><div class="kpi-val">#${rank}</div><div class="kpi-label">Posición</div></div>
    <div class="kpi" style="flex:1;min-width:100px"><div class="kpi-val">${t.pts}</div><div class="kpi-label">Puntos</div></div>
    <div class="kpi" style="flex:1;min-width:100px"><div class="kpi-val">${t.exact}</div><div class="kpi-label">Exactos</div></div>
    <div class="kpi" style="flex:1;min-width:100px"><div class="kpi-val">${t.streak>0?'🔥'+t.streak:'—'}</div><div class="kpi-label">Racha</div></div>
  </div>`;

  h+=`<div class="card" style="padding:0;overflow:hidden">`;
  h+=`<table><thead><tr><th>#</th><th>Local</th><th>Resultado</th><th>Visitante</th><th>Pick</th><th>Pts</th></tr></thead><tbody>`;
  MATCHES.forEach(m=>{
    const r=RES[m.id];
    const rl=r?r.rl:m.rl;
    const rv=r?r.rv:m.rv;
    const pick=m.picks[activePlayer]||'—';
    const hasr=rl!==null&&rl!==undefined;
    if(!hasr){
      h+=`<tr><td style="color:#aaa">${m.id}</td><td>${m.local}</td><td style="color:#ccc">TBD</td><td>${m.visitor}</td><td style="font-weight:600">${pick}</td><td>—</td></tr>`;
      return;
    }
    const pts=calcPoints(pick,rl,rv);
    const parts=pick.split('-');
    const pl=parseInt(parts[0]),pv=parseInt(parts[1]);
    let cat='miss';
    if(pl===rl&&pv===rv)cat='exact';
    else{const rD=rl-rv,pD=pl-pv;const rS=Math.sign(rD),pS=Math.sign(pD);if(rS===pS&&rS!==0&&rD===pD)cat='diff';else if(rS===pS)cat='win';}
    const badgeCls=cat==='exact'?'badge-exact':cat==='diff'?'badge-diff':cat==='win'?'badge-win':'badge-miss';
    const catLabel=cat==='exact'?'Exacto':cat==='diff'?'Diferencia':cat==='win'?'Ganador':'Fallo';
    h+=`<tr>
      <td style="color:#888">${m.id}</td>
      <td>${m.local}</td>
      <td style="font-weight:700;text-align:center">${rl}—${rv}</td>
      <td>${m.visitor}</td>
      <td style="font-weight:600">${pick} <span class="badge ${badgeCls}">${catLabel}</span></td>
      <td><span class="pts-pill">${pts}</span></td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById('view-jugadores').innerHTML=h;
}
function setActivePlayer(p){activePlayer=p;renderJugadores();}

// ===================== UTILS =====================
function fmtDate(d){
  if(!d)return '';
  const parts=d.split('-');
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(parts[2])} ${months[parseInt(parts[1])-1]}`;
}
function fmtDateShort(d){
  if(!d)return '';
  const parts=d.split('-');
  return `${parseInt(parts[2])}/${parseInt(parts[1])}`;
}
